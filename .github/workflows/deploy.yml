name: Deploy Weather App to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    env:
      AWS_DEFAULT_REGION: 'ap-southeast-1'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Initialise env variables
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "VITE_OPEN_WEATHER_API_KEY=${{ secrets.VITE_OPEN_WEATHER_API_KEY_PROD }}" >> envs/.env
          else
            echo "Invalid branch for deployment. Deployment ending now."
            exit 0
          fi

      - name: Lint and Build Project
        run: yarn build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Deploy to AWS S3 bucket
        run: |
          aws s3 sync ./dist/ s3://weather-app.click --delete

      - name: Clean up
        run: |
          rm -rf envs
        if: always()

